<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="720" viewBox="0 0 1300 720" role="img" aria-label="Tech stack — Backend, Frontend, Architecture, Data Layer, DevOps, AI &amp; Data">
  <style>
    .t-caption { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 600; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; }
    .t-title   { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -0.01em; fill: #FFFFFF; }
    .t-tagline { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 500; font-size: 13px; font-style: italic; fill: #9BA1A6; }
    .t-tool    { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 500; font-size: 13px; letter-spacing: 0.01em; fill: #E8E8E8; }
    .t-stat-num { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 700; font-size: 18px; }
    .t-stat-lbl { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 600; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; fill: #6E7681; }

    .breathe-stripe { animation: stripeBreathe 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes stripeBreathe {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }

    .draw-bar {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: drawBar 1.8s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes drawBar { to { stroke-dashoffset: 0; } }

    /* Card stagger fade-in — only opacity, NO transform (avoids collision with parent's SVG translate) */
    .card-fade {
      opacity: 0;
      animation: cardFade 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes cardFade { to { opacity: 1; } }
    .c1{animation-delay:0.0s}.c2{animation-delay:0.08s}.c3{animation-delay:0.16s}
    .c4{animation-delay:0.24s}.c5{animation-delay:0.32s}.c6{animation-delay:0.40s}
    .b1{animation-delay:0.5s}.b2{animation-delay:0.6s}.b3{animation-delay:0.7s}
    .b4{animation-delay:0.8s}.b5{animation-delay:0.9s}.b6{animation-delay:1.0s}
  </style>

  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1A2028" stop-opacity="0.96" />
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0.96" />
    </linearGradient>
    <linearGradient id="cardHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.06" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="accentRed"    x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#F90001"/><stop offset="100%" stop-color="#FF4D4F"/></linearGradient>
    <linearGradient id="accentOrange" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FF652F"/><stop offset="100%" stop-color="#FFB088"/></linearGradient>
    <linearGradient id="accentGreen"  x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#6EE7B7"/></linearGradient>
    <linearGradient id="accentGold"   x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FFD23F"/><stop offset="100%" stop-color="#FFE680"/></linearGradient>
    <linearGradient id="accentCyan"   x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#67E8F9"/></linearGradient>
    <linearGradient id="accentPurple" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#C4B5FD"/></linearGradient>

    <linearGradient id="profGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F90001"/>
      <stop offset="100%" stop-color="#FF652F"/>
    </linearGradient>

    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#F90001" fill-opacity="0.08"/>
    </pattern>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="shadow"/>
      <feFlood flood-color="#000000" flood-opacity="0.55"/>
      <feComposite in2="shadow" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1300" height="720" fill="url(#dots)"/>

  <!-- ═════════ CARD 1 — ⚙️ BACKEND  (red, top-left) ═════════ -->
  <g transform="translate(30,30)">
    <g class="card-fade c1">
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardBg)" filter="url(#cardShadow)"/>
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardHighlight)"/>
      <rect x="0" y="0" width="400" height="4" rx="2" fill="url(#accentRed)" class="breathe-stripe"/>
      <text x="32" y="48" class="t-caption" fill="#F90001">SERVER · APIS · LOGIC</text>
      <text x="32" y="86" class="t-title">⚙️ Backend</text>
      <text x="32" y="114" class="t-tagline">Robust, well-tested server-side systems.</text>
      <text x="32" y="158" class="t-tool" fill="#FFFFFF" font-weight="700">Python · Django · DRF</text>
      <text x="32" y="180" class="t-tool">FastAPI · Flask · JWT</text>
      <text x="32" y="202" class="t-tool" fill="#9BA1A6">REST · GraphQL · Celery · Caching</text>
      <line x1="32" y1="228" x2="368" y2="228" stroke="#21262D" stroke-width="1"/>
      <text x="32"  y="260" class="t-stat-num" fill="#F90001">4+</text>
      <text x="32"  y="276" class="t-stat-lbl">YEARS</text>
      <text x="152" y="260" class="t-stat-num" fill="#F90001">30+</text>
      <text x="152" y="276" class="t-stat-lbl">PROJECTS</text>
      <text x="272" y="260" class="t-stat-num" fill="#F90001">EXPERT</text>
      <text x="272" y="276" class="t-stat-lbl">MASTERY</text>
      <rect x="32" y="298" width="336" height="3" rx="1.5" fill="#21262D"/>
      <line x1="32" y1="299.5" x2="337" y2="299.5" stroke="url(#profGrad)" stroke-width="3" stroke-linecap="round" class="draw-bar b1"/>
    </g>
  </g>

  <!-- ═════════ CARD 2 — 🎨 FRONTEND  (orange, top-middle) ═════════ -->
  <g transform="translate(450,30)">
    <g class="card-fade c2">
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardBg)" filter="url(#cardShadow)"/>
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardHighlight)"/>
      <rect x="0" y="0" width="400" height="4" rx="2" fill="url(#accentOrange)" class="breathe-stripe"/>
      <text x="32" y="48" class="t-caption" fill="#FF652F">CLIENT · UI · INTERACTION</text>
      <text x="32" y="86" class="t-title">🎨 Frontend</text>
      <text x="32" y="114" class="t-tagline">Interactive, accessible interfaces.</text>
      <text x="32" y="158" class="t-tool" fill="#FFFFFF" font-weight="700">Vue 3 · Nuxt · TypeScript</text>
      <text x="32" y="180" class="t-tool">JavaScript · Tailwind · Bootstrap</text>
      <text x="32" y="202" class="t-tool" fill="#9BA1A6">Vuetify · jQuery · Htmx · Composition</text>
      <line x1="32" y1="228" x2="368" y2="228" stroke="#21262D" stroke-width="1"/>
      <text x="32"  y="260" class="t-stat-num" fill="#FF652F">4+</text>
      <text x="32"  y="276" class="t-stat-lbl">YEARS</text>
      <text x="152" y="260" class="t-stat-num" fill="#FF652F">25+</text>
      <text x="152" y="276" class="t-stat-lbl">PROJECTS</text>
      <text x="272" y="260" class="t-stat-num" fill="#FF652F">ADVANCED</text>
      <text x="272" y="276" class="t-stat-lbl">MASTERY</text>
      <rect x="32" y="298" width="336" height="3" rx="1.5" fill="#21262D"/>
      <line x1="32" y1="299.5" x2="312" y2="299.5" stroke="url(#profGrad)" stroke-width="3" stroke-linecap="round" class="draw-bar b2"/>
    </g>
  </g>

  <!-- ═════════ CARD 3 — 🏗️ ARCHITECTURE  (green, top-right) ═════════ -->
  <g transform="translate(870,30)">
    <g class="card-fade c3">
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardBg)" filter="url(#cardShadow)"/>
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardHighlight)"/>
      <rect x="0" y="0" width="400" height="4" rx="2" fill="url(#accentGreen)" class="breathe-stripe"/>
      <text x="32" y="48" class="t-caption" fill="#34D399">SYSTEMS · DESIGN · SCALE</text>
      <text x="32" y="86" class="t-title">🏗️ Architecture</text>
      <text x="32" y="114" class="t-tagline">Distributed, event-driven systems.</text>
      <text x="32" y="158" class="t-tool" fill="#FFFFFF" font-weight="700">Microservices · RabbitMQ</text>
      <text x="32" y="180" class="t-tool">Event-Driven · API Gateway</text>
      <text x="32" y="202" class="t-tool" fill="#9BA1A6">Domain-Driven · Service Mesh · CQRS</text>
      <line x1="32" y1="228" x2="368" y2="228" stroke="#21262D" stroke-width="1"/>
      <text x="32"  y="260" class="t-stat-num" fill="#34D399">3+</text>
      <text x="32"  y="276" class="t-stat-lbl">YEARS</text>
      <text x="152" y="260" class="t-stat-num" fill="#34D399">8+</text>
      <text x="152" y="276" class="t-stat-lbl">SYSTEMS</text>
      <text x="272" y="260" class="t-stat-num" fill="#34D399">PROFICIENT</text>
      <text x="272" y="276" class="t-stat-lbl">MASTERY</text>
      <rect x="32" y="298" width="336" height="3" rx="1.5" fill="#21262D"/>
      <line x1="32" y1="299.5" x2="277" y2="299.5" stroke="url(#profGrad)" stroke-width="3" stroke-linecap="round" class="draw-bar b3"/>
    </g>
  </g>

  <!-- ═════════ CARD 4 — 💾 DATA LAYER  (gold, bottom-left) ═════════ -->
  <g transform="translate(30,380)">
    <g class="card-fade c4">
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardBg)" filter="url(#cardShadow)"/>
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardHighlight)"/>
      <rect x="0" y="0" width="400" height="4" rx="2" fill="url(#accentGold)" class="breathe-stripe"/>
      <text x="32" y="48" class="t-caption" fill="#FFD23F">PERSISTENCE · STATE · CACHE</text>
      <text x="32" y="86" class="t-title">💾 Data Layer</text>
      <text x="32" y="114" class="t-tagline">Modeling, indexing, performance.</text>
      <text x="32" y="158" class="t-tool" fill="#FFFFFF" font-weight="700">PostgreSQL · MySQL</text>
      <text x="32" y="180" class="t-tool">Redis · SQLite</text>
      <text x="32" y="202" class="t-tool" fill="#9BA1A6">Migrations · Indexing · ORM patterns</text>
      <line x1="32" y1="228" x2="368" y2="228" stroke="#21262D" stroke-width="1"/>
      <text x="32"  y="260" class="t-stat-num" fill="#FFD23F">4+</text>
      <text x="32"  y="276" class="t-stat-lbl">YEARS</text>
      <text x="152" y="260" class="t-stat-num" fill="#FFD23F">40+</text>
      <text x="152" y="276" class="t-stat-lbl">SCHEMAS</text>
      <text x="272" y="260" class="t-stat-num" fill="#FFD23F">EXPERT</text>
      <text x="272" y="276" class="t-stat-lbl">MASTERY</text>
      <rect x="32" y="298" width="336" height="3" rx="1.5" fill="#21262D"/>
      <line x1="32" y1="299.5" x2="330" y2="299.5" stroke="url(#profGrad)" stroke-width="3" stroke-linecap="round" class="draw-bar b4"/>
    </g>
  </g>

  <!-- ═════════ CARD 5 — 🛠️ DEVOPS & CLOUD  (cyan, bottom-middle) ═════════ -->
  <g transform="translate(450,380)">
    <g class="card-fade c5">
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardBg)" filter="url(#cardShadow)"/>
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardHighlight)"/>
      <rect x="0" y="0" width="400" height="4" rx="2" fill="url(#accentCyan)" class="breathe-stripe"/>
      <text x="32" y="48" class="t-caption" fill="#22D3EE">PLATFORM · CI/CD · DEPLOY</text>
      <text x="32" y="86" class="t-title">🛠️ DevOps &amp; Cloud</text>
      <text x="32" y="114" class="t-tagline">Pipelines that don't break on Friday.</text>
      <text x="32" y="158" class="t-tool" fill="#FFFFFF" font-weight="700">Docker · Git · GitHub Actions</text>
      <text x="32" y="180" class="t-tool">AWS · Heroku · Vercel · Render</text>
      <text x="32" y="202" class="t-tool" fill="#9BA1A6">Linux · Nginx · Containerization</text>
      <line x1="32" y1="228" x2="368" y2="228" stroke="#21262D" stroke-width="1"/>
      <text x="32"  y="260" class="t-stat-num" fill="#22D3EE">4+</text>
      <text x="32"  y="276" class="t-stat-lbl">YEARS</text>
      <text x="152" y="260" class="t-stat-num" fill="#22D3EE">50+</text>
      <text x="152" y="276" class="t-stat-lbl">DEPLOYMENTS</text>
      <text x="272" y="260" class="t-stat-num" fill="#22D3EE">ADVANCED</text>
      <text x="272" y="276" class="t-stat-lbl">MASTERY</text>
      <rect x="32" y="298" width="336" height="3" rx="1.5" fill="#21262D"/>
      <line x1="32" y1="299.5" x2="307" y2="299.5" stroke="url(#profGrad)" stroke-width="3" stroke-linecap="round" class="draw-bar b5"/>
    </g>
  </g>

  <!-- ═════════ CARD 6 — 🤖 AI & DATA  (purple, bottom-right) ═════════ -->
  <g transform="translate(870,380)">
    <g class="card-fade c6">
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardBg)" filter="url(#cardShadow)"/>
      <rect x="0" y="0" width="400" height="320" rx="14" fill="url(#cardHighlight)"/>
      <rect x="0" y="0" width="400" height="4" rx="2" fill="url(#accentPurple)" class="breathe-stripe"/>
      <text x="32" y="48" class="t-caption" fill="#A78BFA">INTELLIGENCE · ANALYTICS</text>
      <text x="32" y="86" class="t-title">🤖 AI &amp; Data</text>
      <text x="32" y="114" class="t-tagline">LLMs, RAG, agents, notebooks.</text>
      <text x="32" y="158" class="t-tool" fill="#FFFFFF" font-weight="700">PyTorch · TensorFlow</text>
      <text x="32" y="180" class="t-tool">NumPy · Pandas · Matplotlib</text>
      <text x="32" y="202" class="t-tool" fill="#9BA1A6">LLMs · RAG · Agents · Jupyter</text>
      <line x1="32" y1="228" x2="368" y2="228" stroke="#21262D" stroke-width="1"/>
      <text x="32"  y="260" class="t-stat-num" fill="#A78BFA">2+</text>
      <text x="32"  y="276" class="t-stat-lbl">YEARS</text>
      <text x="152" y="260" class="t-stat-num" fill="#A78BFA">12+</text>
      <text x="152" y="276" class="t-stat-lbl">EXPERIMENTS</text>
      <text x="272" y="260" class="t-stat-num" fill="#A78BFA">GROWING</text>
      <text x="272" y="276" class="t-stat-lbl">MASTERY</text>
      <rect x="32" y="298" width="336" height="3" rx="1.5" fill="#21262D"/>
      <line x1="32" y1="299.5" x2="232" y2="299.5" stroke="url(#profGrad)" stroke-width="3" stroke-linecap="round" class="draw-bar b6"/>
    </g>
  </g>
</svg>

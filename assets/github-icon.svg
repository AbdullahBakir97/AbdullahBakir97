<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="GitHub @AbdullahBakir97">
  <defs>
    <!-- Pulsing red brand-glow halo -->
    <radialGradient id="ghGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#F90001" stop-opacity="0.85" />
      <stop offset="55%" stop-color="#F90001" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#F90001" stop-opacity="0" />
    </radialGradient>
    <!-- Subtle highlight on the orange disc for depth -->
    <radialGradient id="ghDisc" cx="38%" cy="32%" r="70%">
      <stop offset="0%"  stop-color="#FF8A50" />
      <stop offset="100%" stop-color="#FF652F" />
    </radialGradient>
  </defs>

  <!-- Pulsing brand-red halo (breathes 2.6s) -->
  <circle cx="48" cy="48" r="38" fill="url(#ghGlow)">
    <animate attributeName="r"       values="32;44;32"   dur="2.6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.6s" repeatCount="indefinite" />
  </circle>

  <!-- Orange disc (matches the activity-graph point / card accent #FF652F) -->
  <circle cx="48" cy="48" r="28" fill="url(#ghDisc)" stroke="#F90001" stroke-width="1.5" stroke-opacity="0.7" />

  <!-- Dark Octocat (#0D1117 = your card background blue), perfectly centered.
       16×16 native path × scale(2) = 32×32; translate(32,32) makes it span
       (32,32)–(64,64), centered exactly on (48,48). -->
  <g transform="translate(32,32) scale(2)">
    <path fill="#0D1117" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
  </g>
</svg>

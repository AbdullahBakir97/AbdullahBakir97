name: Update README

on:
  schedule:
    - cron: "30 6 * * *"  # 06:30 UTC daily — runs after metrics.yml at 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir requests==2.32.3

      - name: Refresh README sections
        env:
          GH_USER: AbdullahBakir97
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          PSI_URL: http://kharsa-style.de/
        run: python .github/scripts/update_readme.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(readme): refresh activity, releases, pagespeed, stats"
            git push
          fi

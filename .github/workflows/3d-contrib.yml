name: 3D Profile Contributions

on:
  schedule:
    - cron: "15 1 * * *"  # daily at 01:15 UTC, after metrics.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # NOTE: The yoshi389111/github-profile-3d-contrib action's `YEAR` env var
      # is documented but doesn't actually filter rendered data — every value
      # produces a byte-identical rolling-window SVG (verified 2026-05-04 via
      # sha1sum on profile-night-rainbow across YEAR=2023/2024/2025). We
      # therefore drop the per-year matrix entirely. Per-year contribution
      # visuals are already covered by our self-rendered skylines + heatmaps
      # in the GitHub Skylines section. This workflow now only refreshes the
      # rolling-window style variants.
      - name: Generate rolling-window style variants
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "chore(3d-contrib): regenerate rolling-window 3D contribution style variants"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push attempt $i rejected — pulling with rebase and retrying"
            git pull --rebase origin main
            sleep $((i * 5))
          done
          echo "::error::failed to push after 5 attempts"
          exit 1

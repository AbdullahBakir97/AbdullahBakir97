name: WakaTime Weekly Stats

on:
  schedule:
    - cron: "30 0 * * 1"  # Mondays at 00:30 UTC — weekly summary
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-waka-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Refresh waka-readme-stats markers
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE: "True"
          SHOW_LINES_OF_CODE: "False"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_LOC_CHART: "False"
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE_GRAPHS: "True"
          SHOW_EDITORS: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_COMMIT: "True"
          COMMIT_BY_ME: "True"
          COMMIT_MESSAGE: "chore(waka): update WakaTime weekly stats"
          LOCALE: "en"
